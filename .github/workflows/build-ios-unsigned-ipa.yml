name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    paths:
      - "ios_app/**"
      - "external_models/pretrained/chinese_clip_rn50/model_manifest.json"
      - "scripts/download_chinese_clip_rn50.py"
      - "scripts/convert_chinese_clip_rn50_coreml.py"
      - "scripts/verify_chinese_clip_coreml_artifacts.py"
      - "scripts/validate_ios_project.py"
      - "scripts/requirements/chinese_clip_coreml.txt"
      - "scripts/ci/check_no_large_git_files.sh"
      - "scripts/ci/stage_chinese_clip_assets.sh"
      - "scripts/ci/build_unsigned_ipa.sh"
      - ".github/workflows/build-ios-unsigned-ipa.yml"

permissions:
  contents: read

concurrency:
  group: unsigned-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned IPA on macOS
    runs-on: macos-15
    timeout-minutes: 75
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
      PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject oversized Git files
        run: bash scripts/ci/check_no_large_git_files.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create project virtual environment
        run: |
          python -m venv .venv

      - name: Restore Chinese-CLIP checkpoint cache
        uses: actions/cache@v4
        with:
          path: external_models/pretrained/chinese_clip_rn50/clip_cn_rn50.pt
          key: chinese-clip-rn50-checkpoint-${{ hashFiles('external_models/pretrained/chinese_clip_rn50/model_manifest.json') }}

      - name: Download and verify Chinese-CLIP checkpoint
        run: .venv/bin/python scripts/download_chinese_clip_rn50.py

      - name: Restore converted Core ML cache
        id: coreml-cache
        uses: actions/cache@v4
        with:
          path: external_models/converted_ios/chinese_clip_rn50_fp16
          key: chinese-clip-rn50-coreml-fp16-${{ runner.os }}-${{ runner.arch }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('external_models/pretrained/chinese_clip_rn50/model_manifest.json', 'scripts/convert_chinese_clip_rn50_coreml.py', 'scripts/requirements/chinese_clip_coreml.txt') }}

      - name: Install pinned model conversion dependencies
        if: steps.coreml-cache.outputs.cache-hit != 'true'
        run: .venv/bin/python -m pip install -r scripts/requirements/chinese_clip_coreml.txt

      - name: Convert Chinese-CLIP to Core ML
        if: steps.coreml-cache.outputs.cache-hit != 'true'
        run: .venv/bin/python scripts/convert_chinese_clip_rn50_coreml.py

      - name: Stage verified Core ML packages for Xcode
        run: bash scripts/ci/stage_chinese_clip_assets.sh

      - name: Validate staged iOS project and generated models
        run: .venv/bin/python scripts/validate_ios_project.py --require-generated-models

      - name: Show build toolchain
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Build unsigned IPA
        run: bash scripts/ci/build_unsigned_ipa.sh

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: IntentResourceDemo-unsigned-ipa
          path: |
            build/ipa/IntentResourceDemo-unsigned.ipa
            build/ipa/IntentResourceDemo-unsigned.ipa.sha256
            build/ipa/ipa-build.json
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  publish:
    name: Publish rolling test release
    if: >-
      github.ref == 'refs/heads/codex/chinese-clip-rn50-fp16' ||
      github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      group: chinese-clip-rn50-fp16-rolling-release
      cancel-in-progress: false

    steps:
      - name: Download verified IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: IntentResourceDemo-unsigned-ipa
          path: build/ipa

      - name: Verify downloaded IPA artifact
        run: |
          cd build/ipa
          sha256sum --check IntentResourceDemo-unsigned.ipa.sha256
          test "$(stat -c '%s' IntentResourceDemo-unsigned.ipa)" = "$(jq -r '.bytes' ipa-build.json)"
          test "$(jq -r '.sha256' ipa-build.json)" = "$(cut -d ' ' -f 1 IntentResourceDemo-unsigned.ipa.sha256)"
          test "$(jq -r '.model' ipa-build.json)" = "chinese-clip-rn50-fp16"
          test "$(jq -r '.headSha' ipa-build.json)" = "$GITHUB_SHA"

      - name: Publish rolling unsigned IPA release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: chinese-clip-rn50-fp16-latest
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "Chinese-CLIP RN50 FP16 unsigned IPA" \
              --prerelease \
              --notes "Rolling Chinese-CLIP RN50 FP16 test build for computer download and local Wi-Fi distribution. Verify ipa-build.json before use."
          fi
          gh release upload "$RELEASE_TAG" \
            build/ipa/IntentResourceDemo-unsigned.ipa \
            build/ipa/IntentResourceDemo-unsigned.ipa.sha256 \
            build/ipa/ipa-build.json \
            --clobber
          APP_VERSION="$(jq -r '.appVersion' build/ipa/ipa-build.json)"
          APP_BUILD="$(jq -r '.appBuild' build/ipa/ipa-build.json)"
          gh release edit "$RELEASE_TAG" \
            --title "Chinese-CLIP RN50 FP16 unsigned IPA $APP_VERSION ($APP_BUILD)" \
            --notes "Rolling Chinese-CLIP RN50 FP16 test build. Version: $APP_VERSION ($APP_BUILD). Commit: $GITHUB_SHA. Download on the computer, verify ipa-build.json, then serve it to the phone over local Wi-Fi."
